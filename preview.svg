<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030a06"/>
      <stop offset="100%" style="stop-color:#040d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Scanlines -->
  <pattern id="scan" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
    <rect width="1200" height="1" y="2" fill="rgba(0,255,157,0.03)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#0a2a14" stroke-width="1"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#0d3318" stroke-width="1"/>

  <!-- Corner accents -->
  <polyline points="20,80 20,20 80,20" fill="none" stroke="#00ff9d" stroke-width="2" filter="url(#glow)"/>
  <polyline points="1120,20 1180,20 1180,80" fill="none" stroke="#00ff9d" stroke-width="2" filter="url(#glow)"/>
  <polyline points="20,550 20,610 80,610" fill="none" stroke="#00ff9d" stroke-width="2" filter="url(#glow)"/>
  <polyline points="1120,610 1180,610 1180,550" fill="none" stroke="#00ff9d" stroke-width="2" filter="url(#glow)"/>

  <!-- Wolf emoji area -->
  <text x="600" y="160" text-anchor="middle" font-size="100" filter="url(#glow2)">🐺</text>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="56" font-weight="900"
    fill="#00ff9d" letter-spacing="12" filter="url(#glow)">CRYPTOWOLF</text>

  <!-- Subtitle -->
  <text x="600" y="285" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="16"
    fill="#1a3a22" letter-spacing="6">BANKR PERPETUALS BOT  ·  AVANTIS  ·  BASE</text>

  <!-- Divider -->
  <line x1="200" y1="310" x2="1000" y2="310" stroke="#0a2a14" stroke-width="1"/>

  <!-- Stats row -->
  <!-- BTC box -->
  <rect x="160" y="335" width="240" height="90" fill="#060f08" stroke="#0a2a14" stroke-width="1"/>
  <rect x="160" y="335" width="3" height="90" fill="#00d4ff"/>
  <text x="260" y="372" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#00d4ff" filter="url(#glow)">BTC</text>
  <text x="260" y="398" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#1a3a22" letter-spacing="2">5x → 8x MAX</text>
  <text x="260" y="416" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00ff9d">SL 0.7% · TP 2.5%</text>

  <!-- ETH box -->
  <rect x="480" y="335" width="240" height="90" fill="#060f08" stroke="#0a2a14" stroke-width="1"/>
  <rect x="480" y="335" width="3" height="90" fill="#00ff9d"/>
  <text x="580" y="372" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#00ff9d" filter="url(#glow)">ETH</text>
  <text x="580" y="398" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#1a3a22" letter-spacing="2">8x → 12x MAX</text>
  <text x="580" y="416" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00ff9d">SL 1.0% · TP 3.5%</text>

  <!-- SOL box -->
  <rect x="800" y="335" width="240" height="90" fill="#060f08" stroke="#0a2a14" stroke-width="1"/>
  <rect x="800" y="335" width="3" height="90" fill="#ffd60a"/>
  <text x="900" y="372" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#ffd60a" filter="url(#glow)">SOL</text>
  <text x="900" y="398" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#1a3a22" letter-spacing="2">10x → 15x MAX</text>
  <text x="900" y="416" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00ff9d">SL 1.5% · TP 5.0%</text>

  <!-- Divider 2 -->
  <line x1="200" y1="450" x2="1000" y2="450" stroke="#0a2a14" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="600" y="500" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="18"
    fill="#00ff9d" letter-spacing="4" filter="url(#glow)">FLOW SNIPER · LIQUIDITY HUNTER · CAPITAL PROTECTOR</text>

  <!-- Kill switch indicator -->
  <circle cx="420" cy="545" r="5" fill="#ff3d71" filter="url(#glow)"/>
  <text x="432" y="550" font-family="'Courier New', monospace" font-size="13" fill="#1a3a22" letter-spacing="1">KILL SWITCH ACTIVE</text>

  <circle cx="660" cy="545" r="5" fill="#00ff9d" filter="url(#glow)"/>
  <text x="672" y="550" font-family="'Courier New', monospace" font-size="13" fill="#1a3a22" letter-spacing="1">ROTATION ENGINE ON</text>

  <!-- Blinking cursor simulation -->
  <rect x="570" y="570" width="8" height="16" fill="#00ff9d" opacity="0.7"/>
</svg>
